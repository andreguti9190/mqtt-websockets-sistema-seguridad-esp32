                </p>

                <label class="toggle-switch">
                    <input type="checkbox" class="toggle-input" id="toggle-sensor-page">

    <!-- SOCKET.IO -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>

    <!-- SCRIPTS -->

    <script>

        const socket = io("ws://localhost:3000");

        socket.on("connect",()=>{
            document.querySelector('.live-dot').style.background = '#00FF9C';
            document.querySelector('.live-dot').style.boxShadow = '0 0 10px #00FF9C';
        });

        socket.on("disconnect",()=>{
            document.querySelector('.live-dot').style.background = '#FF3B3B';
            document.querySelector('.live-dot').style.boxShadow = '0 0 10px #FF3B3B';
        });

        socket.on("movimiento",(msg)=>{
            const status = document.getElementById('status-sensor-page');
            const label = document.getElementById('label-sensor-page');
            const toggle = document.getElementById('toggle-sensor-page');
            if(msg === 'Activado' || msg === 'true'){
                status.textContent = 'Activado';
                status.className = 'status active-status';
                label.textContent = 'Activado';
                toggle.checked = true;
            } else {
                status.textContent = 'Desactivado';
                status.className = 'status danger-status';
                label.textContent = 'Desactivado';
                toggle.checked = false;
            }
        });

        function updateClock(){

            const now = new Date();

            const date = now.toLocaleDateString('es-AR', {

                weekday:'short',

                day:'numeric',

                month:'short',

                year:'numeric'
            });

            const time = now.toLocaleTimeString('es-AR');

            document.getElementById('date').innerHTML = date;

            document.getElementById('clock').innerHTML = time;
        }

        setInterval(updateClock, 1000);

        updateClock();

        // TOGGLE SENSOR PIR
        document.getElementById('toggle-sensor-page').addEventListener('change', function(){
            const status = document.getElementById('status-sensor-page');
            const label = document.getElementById('label-sensor-page');
            if(this.checked){
                status.textContent = 'Activado';
                status.className = 'status active-status';
                label.textContent = 'Activado';
            } else {
                status.textContent = 'Desactivado';
                status.className = 'status danger-status';
                label.textContent = 'Desactivado';
            }
        });

    </script>
